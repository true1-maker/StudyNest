<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notice — StudyNest</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="navbar"></div>

<div class="page-header">
  <div class="container">
    <div class="page-header-inner">
      <div>
        <h1 class="page-title">📢 Notice Board</h1>
        <p class="page-sub">Important announcements for students</p>
      </div>
      <button class="btn btn-primary" id="post-btn">+ Post Notice</button>
    </div>
  </div>
</div>

<div class="container" style="max-width:760px;padding-bottom:60px">
  <div class="filter-bar" id="notice-filter">
    <button class="filter-pill active" onclick="setFilter(this,'')">All</button>
    <button class="filter-pill" onclick="setFilter(this,'info')">ℹ️ Info</button>
    <button class="filter-pill" onclick="setFilter(this,'important')">🔴 Important</button>
    <button class="filter-pill" onclick="setFilter(this,'warning')">⚠️ Warning</button>
  </div>
  <div id="notice-list"></div>
  <div id="notice-empty"></div>
</div>

<!-- POST MODAL -->
<div class="modal-overlay" id="post-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">📢 Post Notice</h2>
      <button class="modal-close" onclick="closeModal('post-modal')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Title *</label>
      <input class="form-control" id="n-title" placeholder="Notice title…"/>
    </div>
    <div class="form-group">
      <label class="form-label">Type</label>
      <select class="form-control" id="n-type" style="width:auto">
        <option value="info">ℹ️ Info</option>
        <option value="important">🔴 Important</option>
        <option value="warning">⚠️ Warning</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Content *</label>
      <textarea class="form-control" id="n-content" rows="5" placeholder="Notice content…"></textarea>
    </div>
    <div class="form-error" id="n-err"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-ghost" onclick="closeModal('post-modal')">Cancel</button>
      <button class="btn btn-primary" id="n-submit">Post</button>
    </div>
  </div>
</div>

<footer class="footer">© 2025 StudyNest</footer>
<div id="toast-container"></div>

<script type="module">
import { onAuthChange, getUser, getNotices, addNotice, deleteNotice } from './Js/firebase.js';
import { escHtml, formatDate, toast, openModal, closeModal, renderNavbar, initScrollTop } from './Js/main.js';

initScrollTop();
window.closeModal = closeModal;

let currentUser = null, currentUserData = null;
let allNotices = [], activeFilter = '';

onAuthChange(async user => {
  currentUser = user;
  currentUserData = user ? await getUser(user.uid) : null;
  renderNavbar('notice', currentUserData);
});

window.setFilter = (btn, type) => {
  document.querySelectorAll('#notice-filter .filter-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = type;
  renderNotices();
};

async function loadNotices() {
  allNotices = await getNotices();
  renderNotices();
}

function renderNotices() {
  let notices = allNotices;
  if (activeFilter) notices = notices.filter(n => n.type === activeFilter);

  const list  = document.getElementById('notice-list');
  const empty = document.getElementById('notice-empty');
  list.innerHTML = '';

  if (!notices.length) {
    empty.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><h3>No notices</h3></div>`;
    return;
  }
  empty.innerHTML = '';

  const icons = { info:'ℹ️', important:'🔴', warning:'⚠️' };

  notices.forEach(n => {
    const canDel = currentUser && n.postedById === currentUser.uid;
    list.innerHTML += `
    <div class="notice-card">
      <div class="notice-icon ${n.type||'info'}">${icons[n.type]||'ℹ️'}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">
          <div class="notice-title">${escHtml(n.title)}</div>
          ${canDel ? `<button class="btn btn-ghost btn-sm" data-del="${n.id}" style="color:var(--red);flex-shrink:0">🗑</button>` : ''}
        </div>
        <div class="notice-content">${escHtml(n.content)}</div>
        <div class="notice-meta">📌 ${escHtml(n.postedBy)} · ${formatDate(n.date)}</div>
      </div>
    </div>`;
  });

  list.querySelectorAll('[data-del]').forEach(btn =>
    btn.addEventListener('click', async () => {
      if (!confirm('Delete this notice?')) return;
      await deleteNotice(btn.dataset.del);
      toast('Deleted.','info');
      allNotices = await getNotices();
      renderNotices();
    })
  );
}

document.getElementById('post-btn').addEventListener('click', () => {
  if (!currentUser) { toast('Login first','error'); location.href='login.html'; return; }
  document.getElementById('n-title').value   = '';
  document.getElementById('n-content').value = '';
  document.getElementById('n-err').classList.remove('show');
  openModal('post-modal');
});

document.getElementById('n-submit').addEventListener('click', async () => {
  const title   = document.getElementById('n-title').value.trim();
  const content = document.getElementById('n-content').value.trim();
  const type    = document.getElementById('n-type').value;
  const errEl   = document.getElementById('n-err');
  errEl.classList.remove('show');
  if (!title)   { errEl.textContent='Title required.';   errEl.classList.add('show'); return; }
  if (!content) { errEl.textContent='Content required.'; errEl.classList.add('show'); return; }

  await addNotice({
    title, content, type,
    postedBy: currentUserData?.name || currentUser.displayName || 'Student',
    postedById: currentUser.uid
  });
  closeModal('post-modal');
  toast('Notice posted! 📢','success');
  allNotices = await getNotices();
  renderNotices();
});

loadNotices();
</script>
</body>
</html>
