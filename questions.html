<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Q&amp;A — StudyNest</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="navbar"></div>

<div class="page-header">
  <div class="container">
    <div class="page-header-inner">
      <div>
        <h1 class="page-title">❓ Questions &amp; Answers</h1>
        <p class="page-sub">Ask doubts, get answers from fellow students</p>
      </div>
      <button class="btn btn-primary" onclick="openAskModal()">+ Ask a Question</button>
    </div>
  </div>
</div>

<div class="container" style="padding-bottom:60px">
  <div style="display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
    <input class="form-control" type="text" id="q-search" placeholder="🔍  Search questions…" oninput="renderQuestions()" style="flex:1;max-width:440px"/>
    <select class="form-control" id="q-sort" onchange="renderQuestions()" style="width:auto">
      <option value="newest">Newest First</option>
      <option value="unanswered">Unanswered</option>
      <option value="most-answered">Most Answered</option>
    </select>
  </div>

  <div class="filter-bar" id="q-filter">
    <button class="filter-pill active" data-subj="" onclick="setQFilter(this,'')">All</button>
  </div>

  <div id="q-list"></div>
  <div id="q-empty"></div>
</div>

<!-- ASK QUESTION MODAL -->
<div class="modal-overlay" id="ask-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">❓ Ask a Question</h2>
      <button class="modal-close" onclick="closeModal('ask-modal')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Question Title *</label>
      <input class="form-control" id="a-title" placeholder="What is your question? Be specific…"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Subject *</label>
        <select class="form-control" id="a-subj"><option value="">Select</option></select>
      </div>
      <div class="form-group">
        <label class="form-label">Tags (comma separated)</label>
        <input class="form-control" id="a-tags" placeholder="e.g. Calculus, HSC, Integration"/>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Details *</label>
      <textarea class="form-control" id="a-desc" rows="5" placeholder="Explain your question clearly. Add what you've already tried…"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">📸 Attach Image <span style="color:var(--text-4);font-weight:400">(optional)</span></label>
      <input type="file" class="form-control" id="a-image" accept="image/*" onchange="previewQImage(this)"/>
      <p class="form-hint">Add a photo of your question, diagram, or textbook page. Requires Imgbb API key.</p>
      <div id="a-img-preview" style="display:none;margin-top:10px">
        <img id="a-img-preview-img" style="max-width:100%;max-height:160px;border-radius:var(--radius-sm);border:1px solid var(--border)"/>
        <button onclick="clearQImage()" class="btn btn-ghost btn-sm" style="margin-top:6px">✕ Remove</button>
      </div>
    </div>
    <div class="form-error" id="a-err"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:4px">
      <button class="btn btn-ghost" onclick="closeModal('ask-modal')">Cancel</button>
      <button class="btn btn-primary" id="ask-submit-btn" onclick="submitQuestion()">Post Question</button>
    </div>
  </div>
</div>

<footer class="footer">© 2025 StudyNest</footer>
<div id="toast-container"></div>

<script src="js/main.js"></script>
<script src="js/auth.js"></script>
<script>
initApp('questions');

let activeSubj = getUrlParam('subj') || '';
const focusId  = getUrlParam('id');
let expandedId = focusId || null;

// Subject filter
const qf = document.getElementById('q-filter');
SUBJECTS.forEach(s => {
  qf.innerHTML += `<button class="filter-pill${activeSubj===s?' active':''}" onclick="setQFilter(this,'${s}')">${SUBJ_ICONS[s]} ${s}</button>`;
});

// Subject dropdown
const aSubj = document.getElementById('a-subj');
SUBJECTS.forEach(s => aSubj.innerHTML += `<option value="${s}">${s}</option>`);

function setQFilter(btn, subj) {
  document.querySelectorAll('#q-filter .filter-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeSubj = subj;
  renderQuestions();
}

function renderQuestions() {
  const q     = document.getElementById('q-search').value.trim().toLowerCase();
  const sort  = document.getElementById('q-sort').value;
  let   qs    = getQuestions();

  if (activeSubj) qs = qs.filter(x => x.subject === activeSubj);
  if (q) qs = qs.filter(x =>
    x.title.toLowerCase().includes(q) ||
    (x.description||'').toLowerCase().includes(q) ||
    x.subject.toLowerCase().includes(q) ||
    (x.tags||[]).some(t => t.toLowerCase().includes(q))
  );
  if (sort === 'newest')        qs.sort((a,b) => b.date - a.date);
  if (sort === 'unanswered')    qs = qs.filter(x => !x.answers.length).concat(qs.filter(x => x.answers.length));
  if (sort === 'most-answered') qs.sort((a,b) => b.answers.length - a.answers.length);

  const list  = document.getElementById('q-list');
  const empty = document.getElementById('q-empty');
  list.innerHTML = '';

  if (!qs.length) {
    empty.innerHTML = `<div class="empty-state"><div class="empty-icon">🤔</div><h3>No questions found</h3><p><a href="#" onclick="openAskModal()">Ask the first question!</a></p></div>`;
    return;
  }
  empty.innerHTML = '';

  qs.forEach(q => {
    const isExpanded = expandedId === q.id;
    list.innerHTML += buildQuestionCard(q, isExpanded);
  });

  // Attach answer submit listeners
  document.querySelectorAll('.ans-submit-btn').forEach(btn => {
    btn.addEventListener('click', () => submitAnswer(btn.dataset.qid));
  });
}

function buildQuestionCard(q, expanded) {
  const hasAnswers = q.answers && q.answers.length > 0;
  const answered   = hasAnswers ? 'badge-green' : 'badge-gray';
  const bestAns    = q.answers.find(a => a.isBest);

  let answersHtml = '';
  if (expanded) {
    const answersBody = q.answers.map(a => buildAnswerItem(q.id, a)).join('');
    const u = getCurrentUser();
    const isAsker = u && u.id === q.askerId;
    answersHtml = `
    <div class="question-expand">
      <div class="question-full-desc">${escHtml(q.description)}</div>
      ${q.imageUrl ? `<div style="margin-bottom:16px"><img src="${escHtml(q.imageUrl)}" style="max-width:100%;border-radius:var(--radius-sm);border:1px solid var(--border)"/></div>` : ''}
      <div class="answers-section">
        <div class="answers-header">${q.answers.length} Answer${q.answers.length!==1?'s':''}</div>
        ${answersBody || `<div class="empty-state" style="padding:24px 0"><div class="empty-icon">💬</div><p>No answers yet. Be the first to help!</p></div>`}
        <div class="add-answer-form">
          <div class="add-answer-label">✍️ Your Answer</div>
          <textarea class="form-control" id="ans-${q.id}" rows="5" placeholder="Write a clear, helpful answer…"></textarea>
          <div style="margin-top:10px;display:flex;justify-content:flex-end">
            <button class="btn btn-primary ans-submit-btn" data-qid="${q.id}">Post Answer</button>
          </div>
        </div>
      </div>
    </div>`;
  }

  return `
  <div class="question-item${expanded?' expanded':''}" id="qi-${q.id}">
    <div class="question-top" onclick="toggleQuestion('${q.id}')">
      <div class="question-counts">
        <div class="q-count-box">
          <span class="q-count-num">${q.answers.length}</span>
          <span class="q-count-label">Answers</span>
        </div>
        <div class="q-count-box" style="margin-top:4px">
          <span class="q-count-num" style="font-size:.78rem">${q.views||0}</span>
          <span class="q-count-label">Views</span>
        </div>
      </div>
      <div class="question-body">
        ${bestAns ? '<span class="badge badge-green" style="margin-bottom:6px;display:inline-flex">✅ Solved</span>' : ''}
        <div class="question-title">${escHtml(q.title)}</div>
        ${!expanded ? `<div class="question-preview">${escHtml(q.description)}</div>` : ''}
        <div class="question-tags">
          <span class="badge badge-blue">${escHtml(q.subject)}</span>
          ${(q.tags||[]).map(t=>`<span class="tag">${escHtml(t)}</span>`).join('')}
        </div>
        <div class="question-meta">
          <span>👤 ${escHtml(q.askerName)}</span>
          <span>📅 ${formatDate(q.date)}</span>
          <span>${expanded ? '▲ Collapse' : '▼ Expand'}</span>
        </div>
      </div>
    </div>
    ${answersHtml}
  </div>`;
}

function buildAnswerItem(qid, a) {
  const u = getCurrentUser();
  const voted = u && (a.votes||[]).includes(u.id);
  const isAsker = u && getQuestions().find(q=>q.id===qid)?.askerId === u.id;
  return `
  <div class="answer-item${a.isBest?' best-answer':''}" id="ai-${a.id}">
    <div class="ans-vote">
      <button class="ans-upvote${voted?' voted':''}" onclick="upvoteAnswer('${qid}','${a.id}')" title="Upvote">▲</button>
      <span class="ans-vote-count">${(a.votes||[]).length}</span>
    </div>
    <div class="ans-body">
      ${a.isBest ? '<div class="best-mark">✅ Best Answer</div>' : ''}
      <div class="ans-text">${escHtml(a.text)}</div>
      <div class="ans-meta">
        <div class="avatar avatar-sm" style="background:${avatarColor(a.userId)}">${initial(a.userName)}</div>
        <strong>${escHtml(a.userName)}</strong>
        <span>${formatDate(a.date)}</span>
        ${isAsker && !getQuestions().find(q=>q.id===qid)?.answers.some(x=>x.isBest) && !a.isBest
          ? `<button class="best-btn" onclick="markBest('${qid}','${a.id}')">Mark as Best</button>`
          : ''}
      </div>
    </div>
  </div>`;
}

function toggleQuestion(id) {
  // track view
  updateQuestion(id, q => { q.views = (q.views||0) + 1; });
  expandedId = expandedId === id ? null : id;
  renderQuestions();
  if (expandedId) setTimeout(() => document.getElementById('qi-'+id)?.scrollIntoView({behavior:'smooth',block:'nearest'}), 100);
}

function upvoteAnswer(qid, aid) {
  const u = getCurrentUser();
  if (!u) { toast('Please login to vote','error'); location.href='login.html'; return; }
  updateQuestion(qid, q => {
    const a = q.answers.find(x => x.id === aid);
    if (!a) return;
    a.votes = a.votes || [];
    const i = a.votes.indexOf(u.id);
    if (i >= 0) { a.votes.splice(i,1); }
    else { a.votes.push(u.id); addPoints(a.userId, 1); }
  });
  renderQuestions();
}

function markBest(qid, aid) {
  const u = getCurrentUser();
  if (!u) return;
  updateQuestion(qid, q => {
    if (q.askerId !== u.id) return;
    q.answers.forEach(a => a.isBest = (a.id === aid));
  });
  toast('Marked as best answer! ✅', 'success');
  renderQuestions();
}

function submitAnswer(qid) {
  const u = getCurrentUser();
  if (!u) { toast('Please login to answer','error'); location.href='login.html'; return; }
  const textarea = document.getElementById('ans-'+qid);
  const text = textarea ? textarea.value.trim() : '';
  if (!text) { toast('Please write an answer first','error'); return; }

  updateQuestion(qid, q => {
    q.answers.push({
      id: genId(), text, userId: u.id, userName: u.name,
      date: Date.now(), votes: [], isBest: false
    });
  });
  addPoints(u.id, 3);
  toast('Answer posted! You earned 3 points 🎉', 'success');
  renderQuestions();
}

function openAskModal() {
  if (!requireAuth()) return;
  ['a-title','a-desc','a-tags'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('a-subj').value = '';
  document.getElementById('a-image').value = '';
  document.getElementById('a-img-preview').style.display = 'none';
  document.getElementById('a-err').classList.remove('show');
  openModal('ask-modal');
}

function previewQImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('a-img-preview').style.display = 'block';
    document.getElementById('a-img-preview-img').src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function clearQImage() {
  document.getElementById('a-image').value = '';
  document.getElementById('a-img-preview').style.display = 'none';
}

async function submitQuestion() {
  const u = getCurrentUser();
  if (!u) return;
  const title = document.getElementById('a-title').value.trim();
  const subj  = document.getElementById('a-subj').value;
  const desc  = document.getElementById('a-desc').value.trim();
  const tags  = document.getElementById('a-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const errEl = document.getElementById('a-err');
  errEl.classList.remove('show');

  if (!title) { errEl.textContent='Please add a question title.'; errEl.classList.add('show'); return; }
  if (!subj)  { errEl.textContent='Please select a subject.'; errEl.classList.add('show'); return; }
  if (!desc)  { errEl.textContent='Please describe your question.'; errEl.classList.add('show'); return; }

  // Optional image upload
  let imageUrl = '';
  const imgFile = document.getElementById('a-image').files[0];
  if (imgFile) {
    const btn = document.getElementById('ask-submit-btn');
    btn.disabled = true;
    btn.textContent = 'Uploading…';
    imageUrl = await uploadImageToImgbb(imgFile);
    btn.disabled = false;
    btn.textContent = 'Post Question';
    if (!imageUrl) return;
  }

  addQuestion({
    id: genId(), title, description: desc, subject: subj, tags,
    imageUrl,
    askerId: u.id, askerName: u.name, date: Date.now(), views: 0, answers: []
  });
  addPoints(u.id, 5);
  closeModal('ask-modal');
  toast('Question posted! You earned 5 points 🎉', 'success');
  expandedId = null;
  renderQuestions();
}

renderQuestions();
// If focusId, auto-expand
if (focusId) setTimeout(() => { expandedId = focusId; renderQuestions(); }, 200);
</script>
</body>
</html>
