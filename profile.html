<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — StudyNest</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="navbar"></div>

<div class="profile-hero-section">
  <div class="container">
    <div class="profile-info">
      <div style="position:relative;display:inline-block">
        <div id="p-avatar-wrap" style="width:88px;height:88px;border-radius:50%;overflow:hidden;border:4px solid rgba(255,255,255,.25);cursor:pointer">
          <div class="avatar avatar-xl" id="p-avatar" style="width:100%;height:100%">?</div>
        </div>
        <div id="cam-btn" style="position:absolute;bottom:2px;right:2px;background:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:.85rem;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.2)">📷</div>
        <input type="file" id="avatar-input" accept="image/*" style="display:none"/>
      </div>
      <div>
        <div class="profile-name-big" id="p-name">Loading…</div>
        <div class="profile-inst" id="p-inst"></div>
        <div class="profile-stats-strip">
          <div><div class="p-stat-num" id="ps-notes">0</div><div class="p-stat-label">Notes</div></div>
          <div><div class="p-stat-num" id="ps-questions">0</div><div class="p-stat-label">Questions</div></div>
          <div><div class="p-stat-num" id="ps-answers">0</div><div class="p-stat-label">Answers</div></div>
          <div><div class="p-stat-num" id="ps-points" style="color:#93C5FD">0</div><div class="p-stat-label">Points ⭐</div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="container profile-body-wrap" style="padding-bottom:60px">
  <div id="not-logged" style="display:none">
    <div class="profile-main-card text-center" style="padding:48px">
      <div style="font-size:3rem;margin-bottom:16px">🔒</div>
      <h2 style="font-weight:800;margin-bottom:8px">Please Login First</h2>
      <a href="login.html" class="btn btn-primary btn-lg" style="margin-top:16px">Login / Signup</a>
    </div>
  </div>

  <div id="profile-content" style="display:none">
    <div class="profile-main-card">
      <div class="profile-tabs">
        <button class="p-tab active" data-tab="overview">📊 Overview</button>
        <button class="p-tab" data-tab="notes">📚 My Notes</button>
        <button class="p-tab" data-tab="questions">❓ My Questions</button>
        <button class="p-tab" data-tab="quizzes">📝 Quiz History</button>
        <button class="p-tab" data-tab="edit">✏️ Edit Profile</button>
      </div>

      <!-- Overview -->
      <div id="tab-overview">
        <div class="three-col" style="margin-bottom:20px">
          <div style="background:var(--primary-lt);border:1px solid var(--primary-mid);border-radius:var(--radius);padding:20px;text-align:center">
            <div style="font-size:2rem;font-weight:800;color:var(--primary)" id="ov-notes">0</div>
            <div style="font-size:.78rem;color:var(--text-3);margin-top:4px">Notes Uploaded</div>
          </div>
          <div style="background:var(--green-lt);border:1px solid #A7F3D0;border-radius:var(--radius);padding:20px;text-align:center">
            <div style="font-size:2rem;font-weight:800;color:var(--green)" id="ov-ans">0</div>
            <div style="font-size:.78rem;color:var(--text-3);margin-top:4px">Answers Given</div>
          </div>
          <div style="background:var(--amber-lt);border:1px solid #FDE68A;border-radius:var(--radius);padding:20px;text-align:center">
            <div style="font-size:2rem;font-weight:800;color:var(--amber)" id="ov-pts">0</div>
            <div style="font-size:.78rem;color:var(--text-3);margin-top:4px">Total Points ⭐</div>
          </div>
        </div>
        <div class="card">
          <h3 style="font-weight:700;font-size:.95rem;margin-bottom:14px">🏆 Leaderboard</h3>
          <div id="ov-leaderboard"></div>
        </div>
      </div>

      <!-- My Notes -->
      <div id="tab-notes" style="display:none"><div id="my-notes-list"></div></div>

      <!-- My Questions -->
      <div id="tab-questions" style="display:none"><div id="my-questions-list"></div></div>

      <!-- Quiz History -->
      <div id="tab-quizzes" style="display:none"><div id="my-quiz-history"></div></div>

      <!-- Edit Profile -->
      <div id="tab-edit" style="display:none">
        <div style="max-width:480px">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input class="form-control" id="e-name"/>
          </div>
          <div class="form-group">
            <label class="form-label">Institution</label>
            <input class="form-control" id="e-inst"/>
          </div>
          <div class="form-group">
            <label class="form-label">Class / Year</label>
            <select class="form-control" id="e-class">
              <option value="">Select</option>
              <option>Class 6</option><option>Class 7</option><option>Class 8</option>
              <option>Class 9</option><option>Class 10</option><option>Class 11</option>
              <option>Class 12</option><option>University 1st Year</option>
              <option>University 2nd Year</option><option>University 3rd Year</option>
              <option>University 4th Year</option>
            </select>
          </div>
          <div class="divider"></div>
          <div class="form-group">
            <label class="form-label">🔑 Imgbb API Key (for photo uploads)</label>
            <input class="form-control" id="e-imgbb" placeholder="Paste Imgbb API key…"/>
            <p class="form-hint">Get free key at <a href="https://api.imgbb.com" target="_blank" style="color:var(--primary)">api.imgbb.com</a></p>
          </div>
          <div class="form-error" id="e-err"></div>
          <div style="display:flex;gap:10px;margin-top:8px;flex-wrap:wrap">
            <button class="btn btn-primary" id="save-btn">💾 Save Changes</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer class="footer">© 2025 StudyNest</footer>
<div id="toast-container"></div>

<script type="module">
import { onAuthChange, getUser, updateUserData, getLeaderboard, getNotes, getQuestions, getMyQuizResults, getQuizzes, deleteNote, deleteQuestion } from './Js/firebase.js';
import { escHtml, formatDate, avatarColor, initial, toast, renderNavbar, initScrollTop, uploadImageToImgbb, getImgbbKey, saveImgbbKey } from './Js/main.js';

initScrollTop();
let currentUser = null, currentUserData = null;

onAuthChange(async user => {
  currentUser = user;
  if (!user) {
    document.getElementById('not-logged').style.display   = 'block';
    document.getElementById('profile-content').style.display = 'none';
    renderNavbar('profile', null);
    return;
  }
  currentUserData = await getUser(user.uid);
  renderNavbar('profile', currentUserData);
  loadProfile();
});

// Tabs
document.querySelectorAll('.p-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.p-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ['overview','notes','questions','quizzes','edit'].forEach(t =>
      document.getElementById('tab-'+t).style.display = t === btn.dataset.tab ? 'block' : 'none'
    );
  });
});

// Avatar upload
document.getElementById('cam-btn').addEventListener('click', () => document.getElementById('avatar-input').click());
document.getElementById('p-avatar-wrap').addEventListener('click', () => document.getElementById('avatar-input').click());
document.getElementById('avatar-input').addEventListener('change', async e => {
  const file = e.target.files[0]; if (!file) return;
  toast('Uploading photo…','info');
  const url = await uploadImageToImgbb(file);
  if (!url) return;
  await updateUserData(currentUser.uid, { photoUrl: url });
  currentUserData.photoUrl = url;
  toast('Photo updated! ✅','success');
  renderAvatar();
});

function renderAvatar() {
  const wrap = document.getElementById('p-avatar-wrap');
  const av   = document.getElementById('p-avatar');
  if (currentUserData?.photoUrl) {
    av.innerHTML = `<img src="${escHtml(currentUserData.photoUrl)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`;
    av.style.background = 'transparent';
  } else {
    av.textContent = initial(currentUserData?.name||'?');
    av.style.background = avatarColor(currentUser.uid);
  }
}

async function loadProfile() {
  document.getElementById('not-logged').style.display      = 'none';
  document.getElementById('profile-content').style.display = 'block';

  const u = currentUserData;
  renderAvatar();
  document.getElementById('p-name').textContent = u?.name || '';
  document.getElementById('p-inst').textContent = [u?.class, u?.institution].filter(Boolean).join(' · ') || 'Student';

  // Prefill edit form
  document.getElementById('e-name').value  = u?.name || '';
  document.getElementById('e-inst').value  = u?.institution || '';
  document.getElementById('e-class').value = u?.class || '';
  document.getElementById('e-imgbb').value = getImgbbKey();

  // Stats
  const [notes, questions, quizResults] = await Promise.all([
    getNotes(''), getQuestions(), getMyQuizResults(currentUser.uid)
  ]);
  const myNotes     = notes.filter(n => n.uploaderId === currentUser.uid);
  const myQuestions = questions.filter(q => q.askerId === currentUser.uid);
  const myAnswers   = questions.flatMap(q => q.answers||[]).filter(a => a.userId === currentUser.uid);
  const pts         = u?.points || 0;

  document.getElementById('ps-notes').textContent     = myNotes.length;
  document.getElementById('ps-questions').textContent = myQuestions.length;
  document.getElementById('ps-answers').textContent   = myAnswers.length;
  document.getElementById('ps-points').textContent    = pts;
  document.getElementById('ov-notes').textContent     = myNotes.length;
  document.getElementById('ov-ans').textContent       = myAnswers.length;
  document.getElementById('ov-pts').textContent       = pts;

  // Leaderboard
  const users  = await getLeaderboard();
  const medals = ['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'];
  const myRank = users.findIndex(x => x.uid === currentUser.uid) + 1;
  const lbEl   = document.getElementById('ov-leaderboard');
  let lbHtml   = myRank > 0 ? `<div style="margin-bottom:12px;padding:10px 14px;background:var(--primary-lt);border-radius:var(--radius-sm);font-size:.85rem;font-weight:700;color:var(--primary)">Your rank: <strong>#${myRank}</strong> of ${users.length}</div>` : '';
  users.forEach((x,i) => {
    const isMe = x.uid === currentUser.uid;
    lbHtml += `<div class="lb-row" style="${isMe?'border:2px solid var(--primary);background:var(--primary-lt)':''}">
      <span class="lb-rank">${medals[i]||i+1}</span>
      <div class="avatar avatar-sm" style="background:${avatarColor(x.uid)}">${x.photoUrl?`<img src="${escHtml(x.photoUrl)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`:initial(x.name)}</div>
      <div class="lb-info">
        <span class="lb-name">${escHtml(x.name)} ${isMe?'<span style="font-size:.65rem;color:var(--primary)">(You)</span>':''}</span>
        <span class="lb-inst">${escHtml(x.institution||'Student')}</span>
      </div>
      <span class="lb-pts">${x.points||0} pts</span>
    </div>`;
  });
  lbEl.innerHTML = lbHtml || '<p class="text-muted">No users yet.</p>';

  // My Notes
  const notesEl = document.getElementById('my-notes-list');
  notesEl.innerHTML = myNotes.length ? myNotes.map(n => `
    <div class="note-card" style="margin-bottom:12px">
      <div class="note-card-top">
        <div class="note-type-icon note-type-text">${n.type==='link'?'🔗':n.type==='image'?'🖼':'📝'}</div>
        <div style="flex:1;min-width:0">
          <div class="note-card-title">${escHtml(n.title)}</div>
          <span class="badge badge-blue" style="margin-top:4px">${escHtml(n.subject)}</span>
        </div>
      </div>
      <div class="note-card-meta"><span>📅 ${formatDate(n.date)}</span><span>👁 ${n.views||0}</span><span>❤️ ${(n.likes||[]).length}</span></div>
      <div style="margin-top:10px;display:flex;gap:8px">
        <a href="notes.html?id=${n.id}" class="btn btn-outline btn-sm">👁 View</a>
        <button class="btn btn-red btn-sm" data-del-note="${n.id}">🗑 Delete</button>
      </div>
    </div>`).join('')
    : `<div class="empty-state"><div class="empty-icon">📭</div><h3>No notes yet</h3><p><a href="notes.html">Upload one!</a></p></div>`;

  notesEl.querySelectorAll('[data-del-note]').forEach(btn =>
    btn.addEventListener('click', async () => {
      if (!confirm('Delete?')) return;
      await deleteNote(btn.dataset.delNote);
      toast('Deleted.','info');
      loadProfile();
    })
  );

  // My Questions
  const qEl = document.getElementById('my-questions-list');
  qEl.innerHTML = myQuestions.length ? myQuestions.map(q => `
    <div class="mini-card" style="display:block;padding:16px;margin-bottom:10px;border-radius:var(--radius)">
      <div class="mini-card-title" style="margin-bottom:8px">${escHtml(q.title)}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
        <span class="badge badge-blue">${escHtml(q.subject)}</span>
        <span class="badge ${(q.answers||[]).length?'badge-green':'badge-gray'}">${(q.answers||[]).length} ans</span>
        <span style="font-size:.75rem;color:var(--text-3)">${formatDate(q.date)}</span>
      </div>
      <div style="display:flex;gap:8px">
        <a href="questions.html?id=${q.id}" class="btn btn-outline btn-sm">👁 View</a>
        <button class="btn btn-red btn-sm" data-del-q="${q.id}">🗑 Delete</button>
      </div>
    </div>`).join('')
    : `<div class="empty-state"><div class="empty-icon">🤔</div><h3>No questions yet</h3><p><a href="questions.html">Ask one!</a></p></div>`;

  qEl.querySelectorAll('[data-del-q]').forEach(btn =>
    btn.addEventListener('click', async () => {
      if (!confirm('Delete?')) return;
      await deleteQuestion(btn.dataset.delQ);
      toast('Deleted.','info');
      loadProfile();
    })
  );

  // Quiz History
  const qhEl   = document.getElementById('my-quiz-history');
  const quizzes = await getQuizzes();
  if (!quizResults.length) {
    qhEl.innerHTML = `<div class="empty-state"><div class="empty-icon">📝</div><h3>No attempts yet</h3><p><a href="quiz.html">Take a quiz!</a></p></div>`;
  } else {
    const grouped = {};
    quizResults.forEach(r => { if (!grouped[r.quizId]) grouped[r.quizId]=[]; grouped[r.quizId].push(r); });
    qhEl.innerHTML = Object.entries(grouped).map(([qzId, attempts]) => {
      const qz   = quizzes.find(q => q.id === qzId);
      const best = Math.max(...attempts.map(a => a.score));
      const tot  = attempts[0].total;
      const pct  = Math.round((best/tot)*100);
      return `
      <div class="card" style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px">
          <div style="font-weight:700;font-size:.9rem">${escHtml(qz?.title||'Deleted Quiz')}</div>
          <span class="badge ${pct>=80?'badge-green':pct>=50?'badge-amber':'badge-red'}">Best: ${best}/${tot}</span>
        </div>
        ${[...attempts].sort((a,b)=>(b.date?.seconds||0)-(a.date?.seconds||0)).slice(0,5).map(r => {
          const p = Math.round((r.score/r.total)*100);
          return `<div style="display:flex;align-items:center;gap:10px;font-size:.8rem;margin-bottom:6px">
            <span style="width:70px;color:var(--text-3)">${formatDate(r.date)}</span>
            <div style="flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden">
              <div style="width:${p}%;height:100%;background:${p>=80?'var(--green)':p>=50?'var(--amber)':'var(--red)'};border-radius:4px"></div>
            </div>
            <span style="width:50px;text-align:right;font-weight:700">${r.score}/${r.total}</span>
          </div>`;
        }).join('')}
      </div>`;
    }).join('');
  }
}

// Save profile
document.getElementById('save-btn').addEventListener('click', async () => {
  const name = document.getElementById('e-name').value.trim();
  const inst  = document.getElementById('e-inst').value.trim();
  const cls   = document.getElementById('e-class').value;
  const imgbb = document.getElementById('e-imgbb').value.trim();
  const errEl = document.getElementById('e-err');
  errEl.classList.remove('show');
  if (!name) { errEl.textContent='Name required.'; errEl.classList.add('show'); return; }

  await updateUserData(currentUser.uid, { name, institution: inst, class: cls });
  if (imgbb) saveImgbbKey(imgbb);
  currentUserData = await getUser(currentUser.uid);
  toast('Profile saved! ✅','success');
  loadProfile();
});
</script>
</body>
</html>
