<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz — StudyNest</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="navbar"></div>

<div class="page-header">
  <div class="container">
    <div class="page-header-inner">
      <div>
        <h1 class="page-title">📝 Self-Test Quizzes</h1>
        <p class="page-sub">Test your knowledge with timed MCQ quizzes</p>
      </div>
      <button class="btn btn-primary" id="create-btn">+ Create Quiz</button>
    </div>
  </div>
</div>

<div class="container" style="padding-bottom:60px">
  <div class="filter-bar" id="qz-filter">
    <button class="filter-pill active" onclick="setQzFilter(this,'')">All</button>
  </div>
  <div id="view-browse">
    <div class="quiz-grid" id="quiz-grid"></div>
    <div id="quiz-empty"></div>
  </div>
  <div id="view-player" style="display:none">
    <div class="quiz-player-wrap">
      <div id="player-inprogress">
        <div class="quiz-top-bar">
          <button class="btn btn-ghost btn-sm" id="exit-btn">← Exit</button>
          <div class="quiz-progress"><div class="quiz-progress-fill" id="progress-fill" style="width:0%"></div></div>
          <div class="quiz-timer" id="quiz-timer">⏱ 0:00</div>
        </div>
        <div class="card" style="padding:28px">
          <div class="quiz-q-label" id="q-label"></div>
          <div class="quiz-q-text" id="q-text"></div>
          <div class="quiz-options" id="q-options"></div>
          <div class="quiz-nav-row">
            <div></div>
            <button class="btn btn-primary" id="q-next-btn" disabled>Next →</button>
          </div>
        </div>
      </div>
      <div id="player-result" style="display:none">
        <div class="card">
          <div class="result-box">
            <div><span class="result-score" id="res-score">0</span><span class="result-denom" id="res-denom">/0</span></div>
            <div class="result-label">Correct Answers</div>
            <div class="result-msg" id="res-msg"></div>
            <p id="res-sub" style="font-size:.85rem;color:var(--text-3)"></p>
            <div style="display:flex;gap:10px;justify-content:center;margin-top:24px;flex-wrap:wrap">
              <button class="btn btn-primary" id="retry-btn">🔄 Retry</button>
              <button class="btn btn-outline" id="back-btn">← Back</button>
            </div>
          </div>
          <div class="result-review" id="result-review"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- CREATE MODAL -->
<div class="modal-overlay" id="create-modal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2 class="modal-title">➕ Create Quiz</h2>
      <button class="modal-close" onclick="closeModal('create-modal')">✕</button>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Title *</label>
        <input class="form-control" id="cq-title" placeholder="e.g. Physics MCQ"/>
      </div>
      <div class="form-group">
        <label class="form-label">Subject *</label>
        <select class="form-control" id="cq-subj"><option value="">Select</option></select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Time Limit</label>
      <select class="form-control" id="cq-time" style="width:auto">
        <option value="120">2 min</option><option value="180">3 min</option>
        <option value="240">4 min</option><option value="300" selected>5 min</option>
        <option value="600">10 min</option><option value="900">15 min</option>
      </select>
    </div>
    <div class="divider"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <strong>Questions</strong>
      <button class="btn btn-outline btn-sm" id="add-q-btn">+ Add Question</button>
    </div>
    <div id="questions-builder"></div>
    <div class="form-error" id="cq-err"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-ghost" onclick="closeModal('create-modal')">Cancel</button>
      <button class="btn btn-primary" id="cq-submit">Publish Quiz</button>
    </div>
  </div>
</div>

<footer class="footer">© 2025 StudyNest</footer>
<div id="toast-container"></div>

<script type="module">
import { onAuthChange, getUser, getQuizzes, addQuiz, saveQuizResult, getMyQuizResults, addPoints } from './Js/firebase.js';
import { SUBJECTS, SUBJ_ICONS, escHtml, formatDate, toast, openModal, closeModal, renderNavbar, initScrollTop, genId } from './Js/main.js';

initScrollTop();
window.closeModal = closeModal;

let currentUser = null, currentUserData = null;
let allQuizzes = [], activeSubj = '';
let currentQuiz = null, currentQIdx = 0, selectedAnswers = [], timerInterval = null, secondsLeft = 0;
let qCount = 0;

onAuthChange(async user => {
  currentUser = user;
  currentUserData = user ? await getUser(user.uid) : null;
  renderNavbar('quiz', currentUserData);
});

// Filters
const qzFilter = document.getElementById('qz-filter');
SUBJECTS.forEach(s => {
  qzFilter.innerHTML += `<button class="filter-pill" onclick="setQzFilter(this,'${s}')">${SUBJ_ICONS[s]} ${s}</button>`;
});
window.setQzFilter = (btn, subj) => {
  document.querySelectorAll('#qz-filter .filter-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeSubj = subj;
  renderQuizzes();
};

// Subject dropdown
const cqSubj = document.getElementById('cq-subj');
SUBJECTS.forEach(s => cqSubj.innerHTML += `<option value="${s}">${s}</option>`);

async function loadQuizzes() {
  allQuizzes = await getQuizzes();
  renderQuizzes();
}

async function renderQuizzes() {
  let quizzes = allQuizzes;
  if (activeSubj) quizzes = quizzes.filter(q => q.subject === activeSubj);

  const grid  = document.getElementById('quiz-grid');
  const empty = document.getElementById('quiz-empty');
  grid.innerHTML = '';

  if (!quizzes.length) {
    empty.innerHTML = `<div class="empty-state"><div class="empty-icon">📝</div><h3>No quizzes yet</h3><p><a href="#" id="create-link">Create one!</a></p></div>`;
    document.getElementById('create-link')?.addEventListener('click', e => { e.preventDefault(); openCreateModal(); });
    return;
  }
  empty.innerHTML = '';

  let myResults = [];
  if (currentUser) myResults = await getMyQuizResults(currentUser.uid);

  quizzes.forEach(qz => {
    const myR  = myResults.filter(r => r.quizId === qz.id);
    const best = myR.length ? Math.max(...myR.map(r => r.score)) : null;
    const mins = Math.floor(qz.timeLimitSecs/60);

    grid.innerHTML += `
    <div class="quiz-card card-hover">
      <div class="quiz-emoji">${SUBJ_ICONS[qz.subject]||'📝'}</div>
      <div class="quiz-title">${escHtml(qz.title)}</div>
      <div class="quiz-meta">
        <span class="badge badge-blue">${escHtml(qz.subject)}</span> &nbsp;
        ${qz.questions.length} Qs · ⏱ ${mins} min
        ${best !== null ? `<br/><span style="color:var(--green);font-weight:700;margin-top:4px;display:inline-block">✅ Best: ${best}/${qz.questions.length}</span>` : ''}
      </div>
      <div style="margin-top:auto;padding-top:12px">
        <button class="btn btn-primary btn-sm" data-start="${qz.id}">▶ Start</button>
      </div>
    </div>`;
  });

  grid.querySelectorAll('[data-start]').forEach(btn =>
    btn.addEventListener('click', () => startQuiz(btn.dataset.start))
  );
}

function startQuiz(id) {
  currentQuiz = allQuizzes.find(q => q.id === id);
  if (!currentQuiz) return;
  currentQIdx = 0;
  selectedAnswers = new Array(currentQuiz.questions.length).fill(null);

  document.getElementById('view-browse').style.display = 'none';
  document.getElementById('view-player').style.display = 'block';
  document.getElementById('player-result').style.display = 'none';
  document.getElementById('player-inprogress').style.display = 'block';
  document.getElementById('qz-filter').style.display = 'none';

  secondsLeft = currentQuiz.timeLimitSecs;
  updateTimer();
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    secondsLeft--;
    updateTimer();
    if (secondsLeft <= 0) { clearInterval(timerInterval); finishQuiz(); }
  }, 1000);

  renderQuestion();
}

function updateTimer() {
  const m = Math.floor(secondsLeft/60), s = secondsLeft%60;
  const el = document.getElementById('quiz-timer');
  el.textContent = `⏱ ${m}:${s.toString().padStart(2,'0')}`;
  el.classList.toggle('danger', secondsLeft <= 30);
}

function renderQuestion() {
  const q   = currentQuiz.questions[currentQIdx];
  const tot = currentQuiz.questions.length;
  document.getElementById('q-label').textContent = `Question ${currentQIdx+1} of ${tot}`;
  document.getElementById('q-text').textContent  = q.q;
  document.getElementById('progress-fill').style.width = ((currentQIdx/tot)*100) + '%';

  const optsEl  = document.getElementById('q-options');
  const nextBtn = document.getElementById('q-next-btn');
  nextBtn.disabled = selectedAnswers[currentQIdx] === null;
  nextBtn.textContent = currentQIdx < tot-1 ? 'Next →' : 'Finish ✓';
  optsEl.innerHTML = '';

  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = opt;
    if (selectedAnswers[currentQIdx] === i) btn.classList.add('selected');
    btn.addEventListener('click', () => {
      if (selectedAnswers[currentQIdx] !== null) return;
      selectedAnswers[currentQIdx] = i;
      document.querySelectorAll('.quiz-opt').forEach((b,j) => b.classList.toggle('selected', j===i));
      nextBtn.disabled = false;
    });
    optsEl.appendChild(btn);
  });
}

document.getElementById('q-next-btn').addEventListener('click', () => {
  currentQIdx++;
  if (currentQIdx >= currentQuiz.questions.length) finishQuiz();
  else renderQuestion();
});

async function finishQuiz() {
  clearInterval(timerInterval);
  const tot = currentQuiz.questions.length;
  let score = 0;
  const review = [];

  currentQuiz.questions.forEach((q,i) => {
    const sel = selectedAnswers[i];
    const ok  = sel === q.correct;
    if (ok) score++;
    review.push({ q: q.q, isRight: ok, correctOpt: q.opts[q.correct], selOpt: sel !== null ? q.opts[sel] : 'Not answered' });
  });

  if (currentUser) {
    await saveQuizResult({ quizId: currentQuiz.id, userId: currentUser.uid, score, total: tot });
  }

  document.getElementById('player-inprogress').style.display = 'none';
  document.getElementById('player-result').style.display     = 'block';
  document.getElementById('res-score').textContent  = score;
  document.getElementById('res-denom').textContent  = '/' + tot;

  const pct = Math.round((score/tot)*100);
  const msg = pct===100?'🏆 Perfect!':pct>=80?'🎉 Excellent!':pct>=60?'👍 Good Job!':pct>=40?'📚 Keep Studying!':'💪 Don\'t Give Up!';
  document.getElementById('res-msg').textContent = msg;
  document.getElementById('res-sub').textContent = pct>=80?'Great performance!':'Review the topics and try again.';

  const rev = document.getElementById('result-review');
  rev.innerHTML = `<h3 style="font-weight:700;margin-bottom:14px;font-size:.95rem">📋 Review</h3>`;
  review.forEach((r,i) => {
    rev.innerHTML += `
    <div class="review-item ${r.isRight?'right':'wrong'}">
      <div class="review-q">Q${i+1}: ${escHtml(r.q)}</div>
      <div class="review-a">${r.isRight ? `✅ ${escHtml(r.correctOpt)}` : `❌ You: ${escHtml(r.selOpt)} | ✅ ${escHtml(r.correctOpt)}`}</div>
    </div>`;
  });
}

function exitQuiz() {
  clearInterval(timerInterval);
  currentQuiz = null;
  document.getElementById('view-browse').style.display = 'block';
  document.getElementById('view-player').style.display = 'none';
  document.getElementById('qz-filter').style.display   = 'flex';
  renderQuizzes();
}

document.getElementById('exit-btn').addEventListener('click', exitQuiz);
document.getElementById('back-btn').addEventListener('click', exitQuiz);
document.getElementById('retry-btn').addEventListener('click', () => { if (currentQuiz) startQuiz(currentQuiz.id); });

// Create quiz
function openCreateModal() {
  if (!currentUser) { toast('Login first','error'); location.href='login.html'; return; }
  qCount = 0;
  document.getElementById('questions-builder').innerHTML = '';
  document.getElementById('cq-title').value = '';
  document.getElementById('cq-subj').value  = '';
  document.getElementById('cq-err').classList.remove('show');
  addQuestionField(); addQuestionField(); addQuestionField();
  openModal('create-modal');
}

document.getElementById('create-btn').addEventListener('click', openCreateModal);
document.getElementById('add-q-btn').addEventListener('click', addQuestionField);

function addQuestionField() {
  qCount++;
  const n = qCount;
  document.getElementById('questions-builder').innerHTML += `
  <div class="card" style="margin-bottom:12px;padding:14px" id="qf-${n}">
    <div style="display:flex;justify-content:space-between;margin-bottom:8px">
      <strong style="font-size:.82rem">Q${n}</strong>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('qf-${n}').remove()">✕</button>
    </div>
    <input class="form-control" id="qf-q-${n}" placeholder="Question text…" style="margin-bottom:8px"/>
    ${[0,1,2,3].map(i => `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <input type="radio" name="cr-${n}" value="${i}" ${i===0?'checked':''}/>
      <input class="form-control" id="qf-o-${n}-${i}" placeholder="Option ${String.fromCharCode(65+i)}"/>
    </div>`).join('')}
  </div>`;
}

document.getElementById('cq-submit').addEventListener('click', async () => {
  const title = document.getElementById('cq-title').value.trim();
  const subj  = document.getElementById('cq-subj').value;
  const secs  = parseInt(document.getElementById('cq-time').value);
  const errEl = document.getElementById('cq-err');
  errEl.classList.remove('show');
  if (!title) { errEl.textContent='Add a title.'; errEl.classList.add('show'); return; }
  if (!subj)  { errEl.textContent='Select a subject.'; errEl.classList.add('show'); return; }

  const questions = [];
  for (let n = 1; n <= qCount; n++) {
    if (!document.getElementById('qf-'+n)) continue;
    const q = document.getElementById('qf-q-'+n)?.value.trim();
    if (!q) continue;
    const opts = [0,1,2,3].map(i => (document.getElementById(`qf-o-${n}-${i}`)?.value||'').trim());
    if (opts.filter(Boolean).length < 2) continue;
    const cr = parseInt(document.querySelector(`input[name="cr-${n}"]:checked`)?.value||'0');
    questions.push({ q, opts: opts.map((o,i) => o||`Option ${String.fromCharCode(65+i)}`), correct: cr });
  }

  if (questions.length < 2) { errEl.textContent='Add at least 2 questions.'; errEl.classList.add('show'); return; }

  const btn = document.getElementById('cq-submit');
  btn.disabled = true; btn.textContent = 'Publishing…';

  await addQuiz({
    title, subject: subj, timeLimitSecs: secs, questions,
    creatorId: currentUser.uid,
    creatorName: currentUserData?.name || currentUser.displayName || 'Student'
  });
  await addPoints(currentUser.uid, 10);
  closeModal('create-modal');
  toast(`Quiz published! +10 pts 🎉`,'success');
  btn.disabled = false; btn.textContent = 'Publish Quiz';
  allQuizzes = await getQuizzes();
  renderQuizzes();
});

loadQuizzes();
</script>
</body>
  </html>
