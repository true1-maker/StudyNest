<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz — StudyNest</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="navbar"></div>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="container">
    <div class="page-header-inner">
      <div>
        <h1 class="page-title">📝 Self-Test Quizzes</h1>
        <p class="page-sub">Test your knowledge with timed MCQ quizzes</p>
      </div>
      <button class="btn btn-primary" onclick="openCreateModal()">+ Create Quiz</button>
    </div>
  </div>
</div>

<div class="container" style="padding-bottom:60px">
  <!-- Filter -->
  <div class="filter-bar" id="qz-filter">
    <button class="filter-pill active" onclick="setQzFilter(this,'')">All Subjects</button>
  </div>

  <!-- Quiz browse view -->
  <div id="view-browse">
    <div class="quiz-grid" id="quiz-grid"></div>
    <div id="quiz-empty"></div>
  </div>

  <!-- Quiz player view -->
  <div id="view-player" style="display:none">
    <div class="quiz-player-wrap">
      <!-- In-progress -->
      <div id="player-inprogress">
        <div class="quiz-top-bar">
          <button class="btn btn-ghost btn-sm" onclick="exitQuiz()">← Exit</button>
          <div class="quiz-progress">
            <div class="quiz-progress-fill" id="progress-fill" style="width:0%"></div>
          </div>
          <div class="quiz-timer" id="quiz-timer">⏱ 0:00</div>
        </div>
        <div class="card" style="padding:28px">
          <div class="quiz-q-label" id="q-label">Question 1 of 7</div>
          <div class="quiz-q-text" id="q-text"></div>
          <div class="quiz-options" id="q-options"></div>
          <div class="quiz-nav-row">
            <div></div>
            <button class="btn btn-primary" id="q-next-btn" onclick="nextQuestion()" disabled>Next →</button>
          </div>
        </div>
      </div>

      <!-- Result -->
      <div id="player-result" style="display:none">
        <div class="card">
          <div class="result-box">
            <div>
              <span class="result-score" id="res-score">0</span>
              <span class="result-denom" id="res-denom">/0</span>
            </div>
            <div class="result-label">Correct Answers</div>
            <div class="result-msg" id="res-msg"></div>
            <p id="res-sub" style="font-size:.85rem;color:var(--text-3)"></p>
            <div style="display:flex;gap:10px;justify-content:center;margin-top:24px;flex-wrap:wrap">
              <button class="btn btn-primary" onclick="retryQuiz()">🔄 Retry</button>
              <button class="btn btn-outline" onclick="exitQuiz()">← Back to Quizzes</button>
            </div>
          </div>
          <div class="result-review" id="result-review"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- CREATE QUIZ MODAL -->
<div class="modal-overlay" id="create-modal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2 class="modal-title">➕ Create a Quiz</h2>
      <button class="modal-close" onclick="closeModal('create-modal')">✕</button>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Quiz Title *</label>
        <input class="form-control" id="cq-title" placeholder="e.g. Physics Chapter 3 Quiz"/>
      </div>
      <div class="form-group">
        <label class="form-label">Subject *</label>
        <select class="form-control" id="cq-subj"><option value="">Select</option></select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Time Limit</label>
      <select class="form-control" id="cq-time" style="width:auto">
        <option value="120">2 minutes</option>
        <option value="180">3 minutes</option>
        <option value="240">4 minutes</option>
        <option value="300" selected>5 minutes</option>
        <option value="600">10 minutes</option>
        <option value="900">15 minutes</option>
      </select>
    </div>

    <div class="divider"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <strong style="font-size:.95rem">Questions</strong>
      <button class="btn btn-outline btn-sm" onclick="addQuestionField()">+ Add Question</button>
    </div>
    <div id="questions-builder"></div>
    <div class="form-error" id="cq-err"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-ghost" onclick="closeModal('create-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="submitQuiz()">Publish Quiz</button>
    </div>
  </div>
</div>

<footer class="footer">© 2025 StudyNest</footer>
<div id="toast-container"></div>

<script src="js/main.js"></script>
<script src="js/auth.js"></script>
<script>
initApp('quiz');

// ---------- STATE ----------
let activeSubj = '';
let currentQuiz = null;
let currentQIdx = 0;
let selectedAnswers = [];
let timerInterval = null;
let secondsLeft = 0;
let answered = false;

// ---------- SUBJECT FILTER ----------
const qzFilter = document.getElementById('qz-filter');
SUBJECTS.forEach(s => {
  qzFilter.innerHTML += `<button class="filter-pill" onclick="setQzFilter(this,'${s}')">${SUBJ_ICONS[s]} ${s}</button>`;
});

function setQzFilter(btn, subj) {
  document.querySelectorAll('#qz-filter .filter-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeSubj = subj;
  renderQuizzes();
}

// ---------- SUBJECT DROPDOWN ----------
const cqSubj = document.getElementById('cq-subj');
SUBJECTS.forEach(s => cqSubj.innerHTML += `<option value="${s}">${s}</option>`);

// ---------- RENDER QUIZZES ----------
function renderQuizzes() {
  let quizzes = getQuizzes();
  if (activeSubj) quizzes = quizzes.filter(q => q.subject === activeSubj);
  quizzes.sort((a,b) => b.date - a.date);

  const grid  = document.getElementById('quiz-grid');
  const empty = document.getElementById('quiz-empty');
  grid.innerHTML = '';

  if (!quizzes.length) {
    empty.innerHTML = `<div class="empty-state"><div class="empty-icon">📝</div><h3>No quizzes yet</h3><p><a href="#" onclick="openCreateModal()">Create the first quiz!</a></p></div>`;
    return;
  }
  empty.innerHTML = '';

  const results = getQuizResults();
  const u = getCurrentUser();

  quizzes.forEach(qz => {
    const myResults = u ? results.filter(r => r.quizId === qz.id && r.userId === u.id) : [];
    const bestScore = myResults.length
      ? Math.max(...myResults.map(r => r.score))
      : null;
    const totalQ = qz.questions.length;
    const mins   = Math.floor(qz.timeLimitSecs / 60);

    grid.innerHTML += `
    <div class="quiz-card card-hover">
      <div class="quiz-emoji">${SUBJ_ICONS[qz.subject]||'📝'}</div>
      <div class="quiz-title">${escHtml(qz.title)}</div>
      <div class="quiz-meta">
        <span class="badge badge-blue">${escHtml(qz.subject)}</span> &nbsp;
        ${totalQ} questions &nbsp;·&nbsp; ⏱ ${mins} min
        ${bestScore !== null
          ? `<br/><span style="color:var(--green);font-weight:700;margin-top:4px;display:inline-block">✅ Best: ${bestScore}/${totalQ}</span>`
          : ''}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-primary btn-sm" onclick="startQuiz('${qz.id}')">▶ Start Quiz</button>
        ${myResults.length ? `<button class="btn btn-ghost btn-sm" onclick="showHistory('${qz.id}')">📊 History</button>` : ''}
      </div>
    </div>`;
  });
}

// ---------- START QUIZ ----------
function startQuiz(id) {
  currentQuiz = getQuizzes().find(q => q.id === id);
  if (!currentQuiz) return;
  currentQIdx   = 0;
  selectedAnswers = new Array(currentQuiz.questions.length).fill(null);
  answered      = false;

  document.getElementById('view-browse').style.display = 'none';
  document.getElementById('view-player').style.display = 'block';
  document.getElementById('player-result').style.display = 'none';
  document.getElementById('player-inprogress').style.display = 'block';
  document.getElementById('qz-filter').style.display = 'none';

  secondsLeft = currentQuiz.timeLimitSecs;
  updateTimer();
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    secondsLeft--;
    updateTimer();
    if (secondsLeft <= 0) {
      clearInterval(timerInterval);
      finishQuiz();
    }
  }, 1000);

  renderQuestion();
}

function updateTimer() {
  const m  = Math.floor(secondsLeft / 60);
  const s  = secondsLeft % 60;
  const el = document.getElementById('quiz-timer');
  el.textContent = `⏱ ${m}:${s.toString().padStart(2,'0')}`;
  el.classList.toggle('danger', secondsLeft <= 30);
}

function renderQuestion() {
  const q   = currentQuiz.questions[currentQIdx];
  const tot = currentQuiz.questions.length;
  const pct = ((currentQIdx) / tot) * 100;

  document.getElementById('q-label').textContent = `Question ${currentQIdx+1} of ${tot}`;
  document.getElementById('q-text').textContent  = q.q;
  document.getElementById('progress-fill').style.width = pct + '%';

  const optsEl  = document.getElementById('q-options');
  const nextBtn = document.getElementById('q-next-btn');
  nextBtn.disabled = true;
  nextBtn.textContent = currentQIdx < tot-1 ? 'Next →' : 'Finish ✓';

  optsEl.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = opt;
    btn.dataset.idx = i;
    btn.onclick = () => selectOption(i);
    // restore selection if navigated back
    if (selectedAnswers[currentQIdx] !== null) {
      const sel = selectedAnswers[currentQIdx];
      if (i === sel) btn.classList.add('selected');
      btn.disabled = false; // allow change before submitting
    }
    optsEl.appendChild(btn);
  });

  answered = selectedAnswers[currentQIdx] !== null;
  nextBtn.disabled = !answered;
}

function selectOption(idx) {
  if (answered) return;
  selectedAnswers[currentQIdx] = idx;
  answered = true;
  document.getElementById('q-next-btn').disabled = false;

  // Highlight selected
  document.querySelectorAll('.quiz-opt').forEach((btn, i) => {
    btn.classList.toggle('selected', i === idx);
  });
}

function nextQuestion() {
  if (selectedAnswers[currentQIdx] === null) return;
  currentQIdx++;
  if (currentQIdx >= currentQuiz.questions.length) {
    finishQuiz();
  } else {
    answered = false;
    renderQuestion();
  }
}

function finishQuiz() {
  clearInterval(timerInterval);
  const tot    = currentQuiz.questions.length;
  let   score  = 0;
  const review = [];

  currentQuiz.questions.forEach((q, i) => {
    const sel     = selectedAnswers[i];
    const correct = sel === q.correct;
    if (correct) score++;
    review.push({ q: q.q, sel, correct: q.correct, correctOpt: q.opts[q.correct], selOpt: sel !== null ? q.opts[sel] : 'Not answered', isRight: correct });
  });

  // Save result
  const u = getCurrentUser();
  if (u) {
    const results = getQuizResults();
    results.push({ id: genId(), quizId: currentQuiz.id, userId: u.id, score, total: tot, date: Date.now() });
    saveQuizResults(results);
  }

  // Show result
  document.getElementById('player-inprogress').style.display = 'none';
  document.getElementById('player-result').style.display    = 'block';
  document.getElementById('res-score').textContent  = score;
  document.getElementById('res-denom').textContent  = '/' + tot;

  const pct = Math.round((score/tot)*100);
  let msg, sub;
  if      (pct === 100) { msg = '🏆 Perfect Score!';       sub = 'Absolutely brilliant! You answered every question correctly.'; }
  else if (pct >= 80)   { msg = '🎉 Excellent!';           sub = 'Great performance! Keep it up.'; }
  else if (pct >= 60)   { msg = '👍 Good Job!';            sub = 'You are on the right track. Review the mistakes.'; }
  else if (pct >= 40)   { msg = '📚 Keep Studying!';       sub = 'Review the topics and try again.'; }
  else                  { msg = '💪 Don\'t Give Up!';      sub = 'Read your notes carefully and retry.'; }

  document.getElementById('res-msg').textContent = msg;
  document.getElementById('res-sub').textContent = sub;

  // Review list
  const rev = document.getElementById('result-review');
  rev.innerHTML = `<h3 style="font-weight:700;margin-bottom:14px;font-size:.95rem">📋 Review Answers</h3>`;
  review.forEach((r, i) => {
    rev.innerHTML += `
    <div class="review-item ${r.isRight ? 'right' : 'wrong'}">
      <div class="review-q">Q${i+1}: ${escHtml(r.q)}</div>
      <div class="review-a">
        ${r.isRight
          ? `✅ Correct: ${escHtml(r.correctOpt)}`
          : `❌ You chose: ${escHtml(r.selOpt)} &nbsp;|&nbsp; ✅ Correct: ${escHtml(r.correctOpt)}`}
      </div>
    </div>`;
  });
}

function retryQuiz() {
  if (currentQuiz) startQuiz(currentQuiz.id);
}

function exitQuiz() {
  clearInterval(timerInterval);
  currentQuiz = null;
  document.getElementById('view-browse').style.display = 'block';
  document.getElementById('view-player').style.display = 'none';
  document.getElementById('qz-filter').style.display  = 'flex';
  renderQuizzes();
}

function showHistory(qzId) {
  const u = getCurrentUser();
  if (!u) return;
  const results = getQuizResults().filter(r => r.quizId === qzId && r.userId === u.id);
  const qz = getQuizzes().find(q => q.id === qzId);
  if (!qz || !results.length) return;
  let html = `<strong>${escHtml(qz.title)}</strong><br/><br/>`;
  results.sort((a,b) => b.date - a.date).forEach((r,i) => {
    const pct = Math.round((r.score/r.total)*100);
    html += `Attempt ${i+1}: <strong>${r.score}/${r.total}</strong> (${pct}%) — ${formatDate(r.date)}<br/>`;
  });
  alert(html);
}

// ---------- CREATE QUIZ ----------
let questionCount = 0;

function openCreateModal() {
  if (!requireAuth()) return;
  questionCount = 0;
  document.getElementById('questions-builder').innerHTML = '';
  document.getElementById('cq-title').value = '';
  document.getElementById('cq-subj').value  = '';
  document.getElementById('cq-err').classList.remove('show');
  addQuestionField();
  addQuestionField();
  addQuestionField();
  openModal('create-modal');
}

function addQuestionField() {
  questionCount++;
  const n = questionCount;
  const d = document.getElementById('questions-builder');
  d.innerHTML += `
  <div class="card" style="margin-bottom:14px;padding:16px" id="qf-${n}">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <strong style="font-size:.83rem">Question ${n}</strong>
      <button class="btn btn-ghost btn-sm" onclick="removeQField(${n})">✕ Remove</button>
    </div>
    <div class="form-group">
      <input class="form-control" id="qf-q-${n}" placeholder="Enter your question…"/>
    </div>
    <div class="form-group" style="margin-bottom:6px">
      <label class="form-label" style="font-size:.75rem">Answer Options (mark the correct one)</label>
      ${[0,1,2,3].map(i => `
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <input type="radio" name="correct-${n}" value="${i}" id="cr-${n}-${i}" ${i===0?'checked':''}/>
          <input class="form-control" style="flex:1" id="qf-opt-${n}-${i}" placeholder="Option ${String.fromCharCode(65+i)}"/>
        </div>`).join('')}
    </div>
  </div>`;
}

function removeQField(n) {
  const el = document.getElementById('qf-'+n);
  if (el) el.remove();
}

function submitQuiz() {
  const u = getCurrentUser();
  if (!u) return;
  const title = document.getElementById('cq-title').value.trim();
  const subj  = document.getElementById('cq-subj').value;
  const secs  = parseInt(document.getElementById('cq-time').value);
  const errEl = document.getElementById('cq-err');
  errEl.classList.remove('show');

  if (!title) { errEl.textContent='Please enter a quiz title.'; errEl.classList.add('show'); return; }
  if (!subj)  { errEl.textContent='Please select a subject.'; errEl.classList.add('show'); return; }

  // Collect questions
  const questions = [];
  for (let n = 1; n <= questionCount; n++) {
    const qEl = document.getElementById('qf-'+n);
    if (!qEl) continue;
    const q = document.getElementById('qf-q-'+n)?.value.trim();
    if (!q) continue;
    const opts = [0,1,2,3].map(i => (document.getElementById(`qf-opt-${n}-${i}`)?.value||'').trim());
    if (opts.filter(Boolean).length < 2) continue;
    const correctEl = document.querySelector(`input[name="correct-${n}"]:checked`);
    const correct   = correctEl ? parseInt(correctEl.value) : 0;
    if (!opts[correct]) continue;
    // Pad missing options with placeholder
    const paddedOpts = opts.map((o,i) => o || `Option ${String.fromCharCode(65+i)}`);
    questions.push({ q, opts: paddedOpts, correct });
  }

  if (questions.length < 2) { errEl.textContent='Please add at least 2 valid questions.'; errEl.classList.add('show'); return; }

  const quiz = {
    id: genId(), title, subject: subj, timeLimitSecs: secs,
    creatorId: u.id, creatorName: u.name, date: Date.now(), questions
  };
  const quizzes = getQuizzes();
  quizzes.unshift(quiz);
  saveQuizzes(quizzes);
  addPoints(u.id, 10);
  closeModal('create-modal');
  toast(`Quiz published with ${questions.length} questions! +10 pts 🎉`, 'success');
  renderQuizzes();
}

renderQuizzes();
</script>
</body>
</html>
